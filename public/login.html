<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Rama Bhaiya Planner</title>
<script>
  // Same trick as index.html: pick the saved theme before the first paint so
  // nobody sees a white flash on the way to a dark page.
  try {
    var t = localStorage.getItem('ramaTheme');
    document.documentElement.dataset.theme = (t === 'light' || t === 'dark') ? t : 'dark';
  } catch (e) { document.documentElement.dataset.theme = 'dark'; }
</script>
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛺</text></svg>">
<style>
  /* The login page is the only screen without the sidebar, so it overrides the
     app's grid body rather than inheriting a layout with a hole in it. */
  body {
    display: grid; grid-template-columns: 1fr; grid-template-rows: 1fr;
    place-items: center; min-height: 100vh; padding: 24px;
  }

  .login-card {
    width: 100%; max-width: 380px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 28px 26px 24px;
    box-shadow: var(--shadow-lg);
  }
  .login-mark {
    font: 800 22px/1 var(--sans); letter-spacing: -0.5px; color: var(--text);
  }
  .login-mark span { color: var(--teal-hi); }
  .login-sub { color: var(--dim); font-size: 12.5px; margin-top: 5px; }
  .login-title { font-size: 15px; font-weight: 650; margin: 22px 0 4px; }
  .login-hint { color: var(--muted); font-size: 12.5px; line-height: 1.5; margin-bottom: 16px; }

  .login-card label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .login-card input {
    width: 100%; padding: 11px 12px; margin-bottom: 14px;
    background: var(--bg-2); border: 1px solid var(--line-2); border-radius: var(--r);
    color: var(--text); font-size: 15px; font-family: var(--sans);
  }
  .login-card input:focus { outline: none; border-color: var(--teal); }

  .login-err {
    display: none; margin-bottom: 14px; padding: 10px 12px;
    background: #ef444418; border: 1px solid #ef444455; border-radius: var(--r);
    color: var(--red); font-size: 12.5px; line-height: 1.45;
  }
  .login-err.on { display: block; }
  .login-foot { margin-top: 16px; color: var(--dim); font-size: 11.5px; line-height: 1.5; }
</style>
</head>
<body>

<form class="login-card" id="form" autocomplete="on">
  <div class="login-mark">transit<span>yx</span></div>
  <div class="login-sub">Rama Planner</div>

  <div class="login-title" id="title">Sign in</div>
  <div class="login-hint" id="hint">Enter the planner password.</div>

  <div class="login-err" id="err"></div>

  <label for="password" id="pw-label">Password</label>
  <input type="password" id="password" autocomplete="current-password" required autofocus>

  <div id="confirm-wrap" style="display:none">
    <label for="confirm">Type it again</label>
    <input type="password" id="confirm" autocomplete="new-password">
  </div>

  <button class="btn btn-primary btn-block" id="submit" type="submit">Sign in</button>

  <div class="login-foot" id="foot">
    This planner holds every driver's name and number. Keep the password to the people who need it.
  </div>
</form>

<script>
'use strict';

const $ = (s) => document.querySelector(s);
const err = $('#err');
let mode = 'login'; // login | setup

function fail(msg) {
  err.textContent = msg;
  err.classList.add('on');
}

function setMode(next) {
  mode = next;
  const setup = mode === 'setup';
  $('#title').textContent = setup ? 'Choose a password' : 'Sign in';
  $('#hint').textContent = setup
    ? 'Nobody has set one yet. Pick a password now — everyone who uses the planner will share it.'
    : 'Enter the planner password.';
  $('#pw-label').textContent = setup ? 'New password' : 'Password';
  $('#password').autocomplete = setup ? 'new-password' : 'current-password';
  $('#confirm-wrap').style.display = setup ? '' : 'none';
  $('#submit').textContent = setup ? 'Set password and continue' : 'Sign in';
}

async function post(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `${res.status} ${res.statusText}`);
  return json;
}

$('#form').onsubmit = async (e) => {
  e.preventDefault();
  err.classList.remove('on');
  const btn = $('#submit');
  const password = $('#password').value;

  if (mode === 'setup' && password !== $('#confirm').value) {
    return fail('The two passwords are not the same.');
  }

  btn.disabled = true;
  const was = btn.textContent;
  btn.textContent = 'Checking…';
  try {
    await post(mode === 'setup' ? '/api/auth/setup' : '/api/auth/login', { password });
    // A full navigation, not a fetch: the session cookie is set, and the app
    // should load from scratch on the other side of the gate.
    location.href = '/';
  } catch (e2) {
    fail(e2.message);
    btn.disabled = false;
    btn.textContent = was;
    $('#password').select();
  }
};

// Ask the server which of the two screens this is.
fetch('/api/auth/state')
  .then((r) => r.json())
  .then((s) => { if (s.needsSetup) setMode('setup'); })
  .catch(() => { /* leave it on the sign-in screen; the submit will say why */ });
</script>
</body>
</html>

# Netlify. The site is the function; Firestore holds the data.
#
# Set the three RAMA_FB_* secrets in the Netlify UI (Site configuration →
# Environment variables), not here. See README, "Putting it online".

[build]
  # Nothing to build — zero dependencies, no bundler, no framework. `publish`
  # still has to point somewhere real, so it points at the static files even
  # though the redirect below means the CDN never serves them directly.
  publish = "public"
  command = "echo 'nothing to build'"

[functions]
  node_bundler = "esbuild"
  # server.js reads these off disk at request time, so they have to travel with
  # the function. Without this the site is a working API serving 404s for every
  # page.
  included_files = ["public/**"]

[[redirects]]
  # Everything. Not just /api — the login gate covers the application as well as
  # its data, and a CDN quietly serving app.js and index.html around the
  # function would be a gate with a door next to it.
  #
  # force = true is what makes that true: without it, Netlify serves a matching
  # file from `publish` and never calls the function.
  from = "/*"
  to = "/.netlify/functions/app"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "20"

# There is deliberately no [context.*.environment] block setting RAMA_SERVERLESS
# here, and putting one back will not do what it looks like it does.
#
# Variables declared in this file reach the BUILD. They do not reach the
# function at runtime. RAMA_SERVERLESS declared here therefore never arrives,
# server.js keeps the empty dataset it starts with, and the site offers to set a
# password on a planner that already has 166 drivers in it — while looking, from
# the outside, exactly like a working deployment.
#
# netlify/functions/app.mjs sets the flag directly instead, because it is the
# one piece of code that knows for certain it is running as a function. The only
# variables that need to exist in the Netlify UI are the three RAMA_FB_ ones.
